server:
  port: ${PORT:8080}

spring:
  application:
    name: Learnin prep
  domain:
    url: ${DOMAIN_URL}
  mail:
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI}

  jackson:
    default-property-inclusion: non_null
    deserialization:
      accept-single-value-as-array: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://learnin-prep.vercel.app}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  frontend:
    url: ${FRONTEND_URL:https://learnin-prep.vercel.app}
  ai:
    prompts:
      jd-analysis: >
        You are an expert Technical Interview Coach for Java Developers. Analyze the provided Job Description (JD) and map it to my curriculum. 
        My Available Topics Mapping: %s. 
        (This mapping is a JSON object where keys are Modules like "THEORY", "SYSTEM_DESIGN", "DSA", and values are arrays of valid topic strings).

        Task: Analyze the JD and return a JSON object with these keys: 
        'role', 'difficulty', 'strategyMessage', 'radarData', 'expectations', 'focusAreas', 'validJd' (boolean), 'failureMessage' (string). 

        Constraints: 
        - Return ONLY valid, minified JSON. 
        - Do NOT include markdown code blocks.
        - For 'validJd': Set to 'false' if the JD is junk, spam, too short, or not a real technical job description, and provide a clear 'failureMessage'. Set to 'true' otherwise.

        The 'radarData' key MUST be an array of objects: {"topic": "Exact Topic Name", "level": "MUST_KNOW", "module": "EXACT_MODULE_KEY"}. 
        The 'focusAreas' key MUST be an array of objects: {"title": "Exact Topic Name", "description": "Short description", "module": "EXACT_MODULE_KEY"}.

        CRITICAL EXPECTATIONS & MISSING SKILLS RULE:
        The 'expectations' key MUST be an array of 3-4 strings representing senior requirements. IF the JD strongly emphasizes an important technical skill or tool that is NOT present in the Available Topics Mapping, you MUST add it here as one of the expectation strings (e.g., "Requires strong knowledge of Spring Webflux and reactive programming").

        CRITICAL ZERO-HALLUCINATION & EXACT MATCH RULE: 
        You are STRICTLY FORBIDDEN from inventing new topics for the radarData or focusAreas. You MUST select topics EXACTLY as they appear in the Available Topics Mapping. Pay strict attention to spacing and casing (e.g., if the map says "Spring Boot", you must output "Spring Boot", NEVER "SpringBoot"). If the JD requires a skill that is NOT in the mapping, you must either map it to the closest existing parent topic, or place it in the 'expectations' array as instructed above. 

        CRITICAL MODULE INHERITANCE RULE: 
        Every item in 'radarData' and 'focusAreas' MUST include the 'module' key. The value of this 'module' key MUST be the exact parent key from the mapping where you found the topic. For example, if you select a topic from the "THEORY" array, its module MUST be "THEORY". You cannot mix and match modules.

        CRITICAL ATOMIC TOPIC RULE: 
        Never combine, blend, or join multiple topics together using separators like '&', 'and', '/', or ',' (e.g., do NOT create 'Docker & Kubernetes'). Every single entry in 'radarData' and 'focusAreas' must represent exactly ONE standalone topic from the mapping.

        CRITICAL RADAR SCORING RULE: Carefully analyze the adjectives and phrasing in the JD to determine the 'level'. 
        - Use 'MUST_KNOW' ONLY for core, primary skills (e.g., 'strong proficiency', 'expert', 'must have'). 
        - Use 'IMPORTANT' for secondary daily skills (e.g., 'experience with', 'working knowledge'). 
        - Use 'NICE_TO_KNOW' for tertiary skills (e.g., 'familiarity with', 'understanding of', 'bonus').
    groq:
      model: "openai/gpt-oss-120b"
      temperature: 1.0
      max-tokens: 2400
      top-p: 1.0
      reasoning-effort: "low"
    cerebras:
      model: "gemma-4-31b"
      temperature: 1.0
      max-tokens: 2100
      top-p: 1.0
      reasoning-effort: "none"
    max-daily-requests: ${MAX_DAILY_REQUESTS:3}
    concurrency-limit: 3
    minJdsize: 200
    maxJdsize: 2500
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000}   # 7 days
    issuer: javaprep-backend

  admin:
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD}
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL}

logging:
  level:
    com.javaprep.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org:
      springframework:
        data:
          mongodb:
            core:
              MongoTemplate=DEBUG:
groq:
  api:
    url: https://api.groq.com/openai/v1
    key: ${GROK_API_KEY} # Replace with ENV var in production
cerebras:
  api:
    url: ${CEREBRAS_API_URL:https://api.cerebras.ai}
    key: ${CEREBRAS_API_KEY}
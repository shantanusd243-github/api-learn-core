server:
  port: ${PORT:8080}

spring:
  application:
    name: Learnin prep
  domain:
    url: ${DOMAIN_URL}
  mail:
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI}

  jackson:
    default-property-inclusion: non_null
    deserialization:
      accept-single-value-as-array: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://learnin-prep.vercel.app}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  frontend:
    url: ${FRONTEND_URL:https://learnin-prep.vercel.app}
  ai:
    prompts:
      jd-analysis: >
        You are an expert Technical Interview Coach for Java Developers. Analyze the provided Job Description (JD) and map it to my curriculum. 
        My Available Topics: %s. 
        Task: Analyze the JD and return a JSON object with these keys: 'role', 'difficulty', 'strategyMessage', 'radarData', 'expectations', 'focusAreas'. 
        Constraints: Return ONLY valid, minified JSON. Do NOT include markdown code blocks. Ensure all topic names match my Available Topics list exactly. 
        The 'radarData' key MUST be an array of objects: {"topic": "Topic Name", "level": "Must Know", "module": "THEORY"}. 
        CRITICAL RADAR SCORING RULE: Carefully analyze the adjectives and phrasing in the JD to determine the 'level'. 
        - Use 'Must Know' ONLY for core, primary skills (e.g., 'strong proficiency', 'expert', 'must have'). 
        - Use 'Important' for secondary daily skills (e.g., 'experience with', 'working knowledge'). 
        - Use 'Nice to Know' for tertiary skills (e.g., 'familiarity with', 'understanding of', 'bonus', 'plus'). Do not mark everything as 'Must Know'.
        The 'expectations' key MUST be an array of 3-4 strings representing senior requirements.
        The 'focusAreas' key MUST be an array of objects: {"title": "Topic Name", "description": "Short description", "module": "THEORY"}.
        CRITICAL MODULE RULE: Every item in 'radarData' and 'focusAreas' MUST include the 'module' key. Its value MUST be exactly one of: "THEORY", "SYSTEM_DESIGN", or "DSA".
    groq:
      model: "openai/gpt-oss-120b"
      temperature: 1.0
      max-tokens: 2500
      top-p: 1.0
      reasoning-effort: "medium"
    max-daily-requests: ${MAX_DAILY_REQUESTS:3}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000}   # 7 days
    issuer: javaprep-backend

  admin:
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD}
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL}

logging:
  level:
    com.javaprep.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org:
      springframework:
        data:
          mongodb:
            core:
              MongoTemplate=DEBUG:
groq:
  api:
    url: https://api.groq.com/openai/v1
    key: ${GROK_API_KEY} # Replace with ENV var in production
server:
  port: ${PORT:8080}

spring:
  application:
    name: Learnin prep
  domain:
    url: ${DOMAIN_URL}
  mail:
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI}

  jackson:
    default-property-inclusion: non_null
    deserialization:
      accept-single-value-as-array: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://learnin-prep.vercel.app}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  frontend:
    url: ${FRONTEND_URL:https://learnin-prep.vercel.app}
  ai:
    prompts:
      jd-analysis: >
        You are an expert Technical Interview Coach for Java Developers.
    
        === VALID TOPIC MAPPING (only these values are allowed) ===
        %s
        === END MAPPING ===
    
        === JOB DESCRIPTION TO ANALYZE ===
        %s
        === END JOB DESCRIPTION ===
    
        === OUTPUT RULES — FOLLOW EXACTLY BEFORE GENERATING ===
    
        OUTPUT: Return ONLY minified JSON. No markdown, no code blocks, no explanation.
    
        KEYS REQUIRED: role, difficulty, strategyMessage, radarData, expectations, focusAreas, validJd, failureMessage
    
        validJd: false if JD is junk/spam/too short/not a real tech JD. Include failureMessage explaining why. Otherwise true.
    
        strategyMessage: max 80 words. Summary of what to focus on for this specific role.
    
        radarData — array of objects:
        {"topic": "<copied from mapping>", "level": "<MUST_KNOW|IMPORTANT|NICE_TO_KNOW>", "module": "<THEORY|DSA|SYSTEM_DESIGN>"}
        Level rules:
          - MUST_KNOW: JD uses "strong proficiency", "expert", "must have", "required"
          - IMPORTANT: JD uses "experience with", "working knowledge", "hands-on"
          - NICE_TO_KNOW: JD uses "familiarity with", "understanding of", "bonus", "nice to have"
    
        focusAreas — array of objects:
        {"title": "<copied from mapping>", "description": "<max 15 words>", "module": "<THEORY|DSA|SYSTEM_DESIGN>"}
    
        RULE A — ZERO HALLUCINATION (most critical):
        topic in radarData and title in focusAreas MUST be copied character-perfect from the VALID TOPIC MAPPING above.
        FORBIDDEN: "Cloud-Native Microservices", "Spring Boot & REST APIs", "Observability & Reliability", any title not in mapping.
        ALLOWED: "Spring Boot", "REST APIs", "Microservices", "Cloud Infrastructure"
        If a skill is not in the mapping — do NOT put it in radarData or focusAreas. Put it in expectations instead.
    
        RULE B — ONE TOPIC PER ENTRY:
        Never combine topics with &, and, /, or comma.
        One entry = exactly one topic string from the mapping. Nothing else.
    
        RULE C — MODULE KEY:
        module must be the exact parent key from the mapping where the topic lives.
        "Spring Boot" lives in THEORY → module is "THEORY"
        "DSA" lives in DSA → module is "DSA"
        "Infrastructure" lives in SYSTEM_DESIGN → module is "SYSTEM_DESIGN"
    
        RULE D — EXPECTATIONS (3-4 strings, specific to this JD):
        Each string must be one of:
          - Missing tech: "Requires hands-on experience with [tool not in mapping]"
          - Role expectation: "Expected to [specific responsibility from this JD]"
        FORBIDDEN: vague lines like "Drive performance optimization" or "Lead a team".
        ALLOWED: "Requires GCP experience (Cloud Datastore, Pub/Sub)", "Expected to lead incident RCA for production systems"
    
        === NOW GENERATE THE JSON ===
    groq:
      model: "openai/gpt-oss-120b"
      temperature: 0.1
      max-tokens: 2400
      top-p: 0.9
      reasoning-effort: "low"
    cerebras:
      model: "gemma-4-31b"
      temperature: 0.2
      max-tokens: 2100
      top-p: 0.9
      reasoning-effort: "none"
    max-daily-requests: ${MAX_DAILY_REQUESTS:3}
    concurrency-limit: 3
    minJdsize: 200
    maxJdsize: 3000
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000}   # 7 days
    issuer: javaprep-backend

  admin:
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD}
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL}

logging:
  level:
    com.javaprep.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org:
      springframework:
        data:
          mongodb:
            core:
              MongoTemplate=DEBUG:
groq:
  api:
    url: https://api.groq.com/openai/v1
    key: ${GROK_API_KEY} # Replace with ENV var in production
cerebras:
  api:
    url: ${CEREBRAS_API_URL:https://api.cerebras.ai}
    key: ${CEREBRAS_API_KEY}
server:
  port: ${PORT:8080}

spring:
  application:
    name: javaprep-backend

  data:
    mongodb:
      uri: ${MONGODB_URI}

  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000}   # 7 days
    issuer: javaprep-backend

  admin:
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD}
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL}

logging:
  level:
    com.javaprep.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org:
      springframework:
        data:
          mongodb:
            core:
              MongoTemplate=DEBUG: